name: Build kernel

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 1

      - name: Checkout kernel source
        run: |
          cd kernel-source
          git fetch --depth 1 origin meme
          git checkout meme

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bc bison flex libelf-dev libssl-dev \
            python3 perl cpio xz-utils \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            clang lld llvm

      - name: Prepare kernel config
        run: |
          cd kernel-source
          cp ../kernel/linux-xiaomi-sunstone/config/vendor/holi_defconfig arch/arm64/configs/vendor/holi_defconfig
          # Disable KernelSU (not in kernel source tree)
          sed -i 's/CONFIG_KSU=y/# CONFIG_KSU is not set/' arch/arm64/configs/vendor/holi_defconfig
          sed -i '/CONFIG_KSU_/d' arch/arm64/configs/vendor/holi_defconfig

      - name: Build kernel
        run: |
          cd kernel-source
          make ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            vendor/holi_defconfig 2>&1
          make ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            LLVM_IAS=1 \
            -j$(nproc) 2>&1

      - name: Package boot.img
        run: |
          mkdir -p output
          # Compress kernel image
          if [ -f kernel-source/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel-source/arch/arm64/boot/Image.gz-dtb output/
          elif [ -f kernel-source/arch/arm64/boot/Image.gz ]; then
            cp kernel-source/arch/arm64/boot/Image.gz output/
          elif [ -f kernel-source/arch/arm64/boot/Image ]; then
            cp kernel-source/arch/arm64/boot/Image output/
          fi
          # Copy DTBs
          find kernel-source/arch/arm64/boot/dts -name "*.dtb" -exec cp {} output/ \;
          # Copy modules
          make -C kernel-source ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            LLVM=1 \
            INSTALL_MOD_PATH=output/modules modules_install 2>/dev/null || true
          ls -la output/

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sunstone-kernel-${{ matrix.arch }}
          path: output/
          retention-days: 30
